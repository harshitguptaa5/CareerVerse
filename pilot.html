<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - Volcanic Flameout</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <a-scene webxr="referenceSpaceType: local" 
             story-manager="career: pilot; 
             introDialogue: MAYDAY! Volcanic ash has triggered a dual-engine flameout. Execute emergency protocol immediately!; 
             timeLimit: 30; 
             climaxPrompt: Altitude critical! Engines failing to restart. Brace for impact location!; 
             goodChoice: Lake Ditching; 
             badChoice: Mountain Landing">
      
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: white; shader: flat" raycaster="objects: .clickable"></a-entity>
          
          <a-text id="timerDisplay" value="T-30s" position="1.1 0.8 -2" color="#FF0000" font="mozillavr" scale="0.8 0.8 0.8"></a-text>

          <!-- DYNAMIC GUIDE HUD -->
          <a-entity position="-1.2 0.4 -2">
            <a-plane width="2" height="1.2" color="#000" opacity="0.85"></a-plane>
            <a-text value="EMERGENCY FLIGHT PROTOCOL:" position="0 0.45 0.05" align="center" color="#ef4444" scale="0.5 0.5 0.5" font="mozillavr"></a-text>
            <a-text id="guideText" value="" position="-0.9 0.1 0.05" align="left" color="#fca5a5" scale="0.45 0.45 0.45" font="mozillavr" width="3.8"></a-text>
          </a-entity>

          <!-- CLIMAX UI -->
          <a-entity id="climaxUI" visible="false" position="0 100 0">
            <a-plane width="3.5" height="1.6" color="#000" opacity="0.95"></a-plane>
            <a-text value="TERRAIN PULL UP:\nGliding capacity reached. Choose ditch site." align="center" position="0 0.4 0.01" color="#FF0000" scale="0.7 0.7 0.7"></a-text>
            
             <a-box position="-0.9 -0.2 0.05" width="1.4" height="0.4" depth="0.1" color="#e74c3c" class="clickable" climax-choice="isGoodChoice: false">
               <a-text value="Mountain\nLanding" align="center" position="0 0 0.06" scale="0.6 0.6 0.6"></a-text>
            </a-box>

            <a-box position="0.9 -0.2 0.05" width="1.4" height="0.4" depth="0.1" color="#2ecc71" class="clickable" climax-choice="isGoodChoice: true">
               <a-text value="Water Ditching\n(Lake)" align="center" position="0 0 0.06" scale="0.6 0.6 0.6"></a-text>
            </a-box>
          </a-entity>
        </a-camera>
        <!-- Intense Camera Shake Effect -->
        <a-animation attribute="position" from="0 1.6 0" to="0 1.63 0.03" dur="40" dir="alternate" loop="true"></a-animation>
      </a-entity>

      <!-- VR Controllers -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

      <!-- Volcano Env -->
      <a-entity environment="preset: volcan; skyType: atmosphere; lighting: point"></a-entity>
      <a-light type="directional" color="#fff" intensity="0.1" position="-1 1 0" animation="property: intensity; to: 3; dur: 80; dir: alternate; loop: true; delay: 2000"></a-light>
      
      <a-box position="0 0.5 -1.5" width="4" height="1" depth="1" color="#111"></a-box> 
      
      <!-- Task 1: APU -->
      <a-box position="-1 1.2 -1.2" depth="0.1" width="0.2" height="0.2" color="#eab308" class="clickable" story-task="taskName: APU Power; guideStep: Engaged Auxiliary Power (APU)">
        <a-text value="APU Power" align="center" position="0 0.3 0" scale="2 2 2" color="#FFF"></a-text>
      </a-box>

      <!-- Task 2: Transponder Squawk 7700 -->
      <a-cylinder position="0 1.2 -1.2" radius="0.1" height="0.1" rotation="90 0 0" color="#ef4444" class="clickable" story-task="taskName: Transponder code 7700; guideStep: Squawked 7700 (Emergency)">
         <a-text value="Squawk 7700" align="center" position="0 0.2 0" scale="2 2 2" color="#FFF" rotation="-90 0 0"></a-text>
      </a-cylinder>

      <!-- Task 3: Fuel Dump -->
      <a-box position="1 1.2 -1.2" depth="0.2" width="0.2" height="0.1" color="#3b82f6" class="clickable" story-task="taskName: Fuel Jettison; guideStep: Dumped Heavy Aviation Fuel">
         <a-text value="Fuel Dump" align="center" position="0 0.2 0" scale="2 2 2" color="#FFF"></a-text>
      </a-box>

      <a-plane id="returnButton" position="0 1.8 -1.4" width="1.5" height="0.4" color="#2ecc71" visible="false" return-to-hub>
        <a-text value="Return to Hub" align="center" position="0 0 0.1"></a-text>
      </a-plane>
    </a-scene>
  </body>
</html>
