<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - Pilot Simulation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <a-scene webxr="referenceSpaceType: local" scene-greeting="message: Aviation Simulation active. Step 1: Engage main battery on the left.">
      
      <!-- HUD -->
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: white; shader: flat" raycaster="objects: .clickable"></a-entity>
          <a-text id="scoreDisplay" value="Score: 0" position="-1.5 0.8 -2" color="#0F0" font="mozillavr" scale="0.6 0.6 0.6"></a-text>
          <a-text id="feedbackText" value="Current Objective: Engage Battery" align="center" position="0 0.9 -2" color="#FFF" width="3" font="mozillavr"></a-text>
        </a-camera>
      </a-entity>
      <!-- Meta Quest VR Controllers -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

      <!-- Sky & Cockpit -->
      <a-sky color="#2c3e50"></a-sky> 
      <a-box position="0 0.5 -1.5" width="4" height="1" depth="1" color="#111"></a-box> <!-- Console -->
      <a-plane position="0 3 -5" width="20" height="10" color="#3498db"></a-plane> <!-- Window view -->

      <!-- TASK 1: Battery -->
      <a-cylinder position="-1 1.2 -1.2" radius="0.1" height="0.1" rotation="90 0 0" color="#e74c3c" class="clickable"
             multi-step-task="career: pilot; stepOrder: 1; taskName: Battery; successMessage: Battery engaged. Systems online. Next, push the center Thruster; points: 10">
        <a-text value="1" align="center" position="0 0.2 0" scale="2 2 2" color="#FFF" rotation="-90 0 0"></a-text>
      </a-cylinder>

      <!-- TASK 2: Thruster -->
      <a-box position="0 1.2 -1.2" depth="0.2" width="0.2" height="0.4" rotation="20 0 0" color="#f1c40f" class="clickable"
             multi-step-task="career: pilot; stepOrder: 2; taskName: Thruster; successMessage: Thrusters at 100%. Next, raise the landing gear on the right; points: 15">
         <a-text value="2" align="center" position="0 0.3 0" scale="2 2 2" color="#FFF"></a-text>
      </a-box>

      <!-- TASK 3: Landing Gear -->
      <a-cylinder position="1 1.2 -1.2" radius="0.1" height="0.1" rotation="90 0 0" color="#9b59b6" class="clickable"
             multi-step-task="career: pilot; stepOrder: 3; taskName: Gear; successMessage: Landing gear raised. Takeoff successful!; points: 20">
         <a-text value="3" align="center" position="0 0.2 0" scale="2 2 2" color="#FFF" rotation="-90 0 0"></a-text>
      </a-cylinder>

      <a-plane id="returnButton" position="0 1.8 -1.4" rotation="0 0 0" width="1.5" height="0.4" color="#2ecc71" visible="false" return-to-hub>
        <a-text value="Return to Hub" align="center" position="0 0 0.1" color="#FFF"></a-text>
      </a-plane>

    </a-scene>
  </body>
</html>
