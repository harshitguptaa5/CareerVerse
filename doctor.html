<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - ER Crisis</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <!-- Story Manager applied to Scene -->
    <a-scene webxr="referenceSpaceType: local" 
             story-manager="career: doctor; 
             introDialogue: Doctor! The patient just arrived from a crash. We are losing him! Act fast!; 
             timeLimit: 30; 
             climaxPrompt: Patient is flatlining! What is your order?; 
             goodChoice: Perform CPR; 
             badChoice: Call Time of Death">
      
      <!-- HUD Text (Attached to Camera) -->
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: white; shader: flat" raycaster="objects: .clickable"></a-entity>
          
          <!-- Cinematic Timer -->
          <a-text id="timerDisplay" value="T-30s" position="1.2 0.8 -2" color="#FF0000" font="mozillavr" scale="0.8 0.8 0.8"></a-text>
          
          <a-text id="feedbackText" value="Awaiting Orders..." align="center" position="0 0.9 -2" color="#FFF" width="3" font="mozillavr"></a-text>

          <!-- CLIMAX UI (Hidden until Climax is triggered) -->
          <a-entity id="climaxUI" visible="false" position="0 100 0"> <!-- Hidden far away initially -->
            <a-plane width="3" height="1.5" color="#000" opacity="0.9"></a-plane>
            <a-text value="CRITICAL DECISION:" align="center" position="0 0.4 0.01" color="#FF0000"></a-text>
            
            <a-box position="-0.8 -0.2 0.05" width="1" height="0.4" depth="0.1" color="#e74c3c" class="clickable" climax-choice="isGoodChoice: false">
               <a-text value="Call Time\nof Death" align="center" position="0 0 0.06" scale="0.6 0.6 0.6"></a-text>
            </a-box>

            <a-box position="0.8 -0.2 0.05" width="1" height="0.4" depth="0.1" color="#3498db" class="clickable" climax-choice="isGoodChoice: true">
               <a-text value="Perform CPR" align="center" position="0 0 0.06" scale="0.6 0.6 0.6"></a-text>
            </a-box>
          </a-entity>

        </a-camera>
      </a-entity>

      <!-- VR Controllers -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

      <!-- Dramatic Environment -->
      <a-sky color="#111111"></a-sky> <!-- Dark ER -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#333344"></a-plane>
      
      <!-- Emergency Flashing Light emitting red glow -->
      <a-light type="point" color="#ff0000" position="0 3 -2" intensity="1" animation="property: intensity; to: 0.2; dir: alternate; loop: true; dur: 500"></a-light>
      
      <!-- Patient -->
      <a-box position="0 0.5 -3" width="2" height="1" depth="4" color="#D3D3D3"></a-box>
      <a-cylinder position="0 1.2 -4" radius="0.4" height="0.5" rotation="90 0 0" color="#FFDAB9"></a-cylinder>

      <!-- TASK 1: Scanner -->
      <a-box position="-1 1.5 -2.5" scale="0.2 0.5 0.2" color="#0000FF" class="clickable" story-task="taskName: Scanner">
        <a-text value="Scanner" align="center" position="0 1.5 0" scale="2 2 2" color="#FFF"></a-text>
      </a-box>

      <!-- TASK 2: Defibrillator -->
      <a-box position="1 1.5 -2.5" scale="0.4 0.2 0.4" color="#FFFF00" class="clickable" story-task="taskName: Defibrillator Charging">
        <a-text value="Defib" align="center" position="0 2 0" scale="2 2 2" color="#FFF"></a-text>
      </a-box>

      <!-- Return Button -->
      <a-plane id="returnButton" position="0 2 -3" rotation="0 0 0" width="1.5" height="0.5" color="#2ecc71" visible="false" return-to-hub>
        <a-text value="Return to Hub" align="center" position="0 0 0.1" color="#FFF"></a-text>
      </a-plane>

    </a-scene>
  </body>
</html>
