<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - Ransomware Attack</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <a-scene webxr="referenceSpaceType: local" 
             story-manager="career: software; 
             introDialogue: Warning. Active ransomware packet detected in production server. Isolate the threat!; 
             timeLimit: 30; 
             climaxPrompt: Malware is attempting to execute in cold storage! Prevent the jump!; 
             goodChoice: Physically Disconnect; 
             badChoice: Pay the Ransom">
      
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: #10b981; shader: flat" raycaster="objects: .clickable"></a-entity>
          
          <a-text id="timerDisplay" value="T-30s" position="1.1 0.8 -2" color="#ef4444" font="mozillavr" scale="0.8 0.8 0.8"></a-text>

          <!-- DYNAMIC GUIDE HUD -->
          <a-entity position="-1.2 0.4 -2">
            <a-plane width="1.8" height="1.0" color="#000" opacity="0.85"></a-plane>
            <a-text value="CYBER INCIDENT PROTOCOL:" position="0 0.4 0.05" align="center" color="#10b981" scale="0.5 0.5 0.5" font="mozillavr"></a-text>
            <a-text id="guideText" value="" position="-0.8 0.1 0.05" align="left" color="#38bdf8" scale="0.45 0.45 0.45" font="mozillavr" width="3.5"></a-text>
          </a-entity>

          <!-- CLIMAX UI -->
          <a-entity id="climaxUI" visible="false" position="0 100 0">
            <a-plane width="3.5" height="1.6" color="#000" opacity="0.95"></a-plane>
            <a-text value="MALWARE PROPAGATING TO BACKUPS:\nSystem failure eminent." align="center" position="0 0.4 0.01" color="#FF0000" scale="0.7 0.7 0.7"></a-text>
            
             <a-box position="-0.9 -0.2 0.05" width="1.4" height="0.4" depth="0.1" color="#e74c3c" class="clickable" climax-choice="isGoodChoice: false">
               <a-text value="Pay 5 BTC Ransom\n(Compromise)" align="center" position="0 0 0.06" scale="0.5 0.5 0.5"></a-text>
            </a-box>

            <a-box position="0.9 -0.2 0.05" width="1.4" height="0.4" depth="0.1" color="#10b981" class="clickable" climax-choice="isGoodChoice: true">
               <a-text value="Purge & Disconnect\nDatabase" align="center" position="0 0 0.06" scale="0.5 0.5 0.5"></a-text>
            </a-box>
          </a-entity>

        </a-camera>
      </a-entity>

      <!-- VR Controllers -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

      <!-- Tron Env -->
      <a-entity environment="preset: tron"></a-entity>
      <a-box position="0 0.8 -2" width="4" height="0.1" depth="2" color="#222"></a-box> <!-- Desk -->
      
      <!-- Glowing Red Monitors -->
      <a-box position="-1 1.3 -2.2" rotation="0 20 0" width="1" height="0.8" depth="0.05" color="#500"></a-box>
      <a-box position="1 1.3 -2.2" rotation="0 -20 0" width="1" height="0.8" depth="0.05" color="#500"></a-box>

      <!-- Task 1: Logs -->
      <a-plane position="-0.6 1.3 -2.0" width="0.3" height="0.3" color="#fcd34d" class="clickable" story-task="taskName: Syslogs; guideStep: Analyzed Syslogs">
         <a-text value="Terminal" align="center" position="0 0 0.02" scale="0.8 0.8 0.8" color="#000"></a-text>
      </a-plane>

      <!-- Task 2: IP Block -->
      <a-plane position="0 1.3 -2.0" width="0.3" height="0.3" color="#ef4444" class="clickable" story-task="taskName: Found Vector IP; guideStep: Blocked Malicious IP">
         <a-text value="Malicious\nIP" align="center" position="0 0 0.02" scale="0.7 0.7 0.7" color="#FFF"></a-text>
      </a-plane>
      
      <!-- Task 3: Root Access -->
      <a-plane position="0.6 1.3 -2.0" width="0.3" height="0.3" color="#8b5cf6" class="clickable" story-task="taskName: Network Switch; guideStep: Isolated Server Network">
         <a-text value="Isolate\nNetwork" align="center" position="0 0 0.02" scale="0.6 0.6 0.6" color="#FFF"></a-text>
      </a-plane>

      <a-plane id="returnButton" position="0 1.9 -2.2" width="1.5" height="0.4" color="#10b981" visible="false" return-to-hub>
        <a-text value="Return to Hub" align="center" position="0 0 0.1"></a-text>
      </a-plane>

    </a-scene>
  </body>
</html>
