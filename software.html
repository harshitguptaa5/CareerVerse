<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - Server Crash</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <a-scene webxr="referenceSpaceType: local" 
             story-manager="career: software; 
             introDialogue: Launch is in one minute! The production database just crashed. Fix it now!; 
             timeLimit: 30; 
             climaxPrompt: SYSTEM OVERLOAD! PURGE DATA OR REROUTE?; 
             goodChoice: Reroute Server; 
             badChoice: Purge Data">
      
      <!-- HUD -->
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: #0F0; shader: flat" raycaster="objects: .clickable"></a-entity>
          
          <a-text id="timerDisplay" value="T-30s" position="1.2 0.8 -2" color="#FF0000" font="mozillavr" scale="0.8 0.8 0.8"></a-text>
          <a-text id="feedbackText" value="Awaiting Orders..." align="center" position="0 0.9 -2" color="#0F0" width="3" font="mozillavr"></a-text>

          <!-- CLIMAX UI -->
          <a-entity id="climaxUI" visible="false" position="0 100 0">
            <a-plane width="3" height="1.5" color="#000" opacity="0.9"></a-plane>
            <a-text value="CRITICAL DECISION:" align="center" position="0 0.4 0.01" color="#FF0000"></a-text>
            
             <a-box position="-0.8 -0.2 0.05" width="1" height="0.4" depth="0.1" color="#e74c3c" class="clickable" climax-choice="isGoodChoice: false">
               <a-text value="Purge Data" align="center" position="0 0 0.06" scale="0.6 0.6 0.6"></a-text>
            </a-box>

            <a-box position="0.8 -0.2 0.05" width="1" height="0.4" depth="0.1" color="#2ecc71" class="clickable" climax-choice="isGoodChoice: true">
               <a-text value="Reroute Server" align="center" position="0 0 0.06" scale="0.6 0.6 0.6"></a-text>
            </a-box>
          </a-entity>

        </a-camera>
      </a-entity>

      <!-- VR Controllers -->
      <a-entity laser-controls="hand: left" raycaster="objects: .clickable; far: 20"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .clickable; far: 20"></a-entity>

      <!-- Dark Office Env -->
      <a-sky color="#050510"></a-sky> 
      <a-box position="0 0.8 -2" width="4" height="0.1" depth="2" color="#222"></a-box> <!-- Desk -->
      
      <!-- Glowing Red Monitors -->
      <a-box position="-1 1.3 -2.2" rotation="0 20 0" width="1" height="0.8" depth="0.05" color="#500"></a-box>
      <a-box position="1 1.3 -2.2" rotation="0 -20 0" width="1" height="0.8" depth="0.05" color="#500"></a-box>

      <!-- TASK 1: Terminal Icon -->
      <a-plane position="-0.4 1.3 -2.0" width="0.3" height="0.3" color="#e67e22" rotation="0 0 0" class="clickable" story-task="taskName: Terminal Open">
         <a-text value="Terminal" align="center" position="0 0 0.02" scale="0.8 0.8 0.8" color="#FFF"></a-text>
      </a-plane>

      <!-- TASK 2: Code Bug Fix -->
      <a-plane position="0.4 1.3 -2.0" width="0.3" height="0.3" color="#3498db" rotation="0 0 0" class="clickable" story-task="taskName: Load Balancer Triggered">
         <a-text value="Load\nBalance" align="center" position="0 0 0.02" scale="0.7 0.7 0.7" color="#FFF"></a-text>
      </a-plane>

      <a-plane id="returnButton" position="0 1.9 -2.2" rotation="0 0 0" width="1.5" height="0.4" color="#3498db" visible="false" return-to-hub>
        <a-text value="Return to Hub" align="center" position="0 0 0.1" color="#FFF"></a-text>
      </a-plane>

    </a-scene>
  </body>
</html>
