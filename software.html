<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - Software Engineer Simulation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Environment setup -->
      <a-sky color="#2C3E50"></a-sky> <!-- Dark mode office -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#34495E"></a-plane>
      
      <!-- Desk -->
      <a-box position="0 0.8 -2" width="4" height="0.1" depth="2" color="#8B4513"></a-box>

      <!-- Task Instructions -->
      <a-text id="feedbackText" value="Look at the laptop to deploy code" align="center" position="0 2.5 -2" color="#FFF" width="5"></a-text>

      <!-- Laptop Task Object -->
      <!-- Laptop Base -->
      <a-box position="0 0.9 -1.8" width="0.8" height="0.05" depth="0.6" color="#C0C0C0"></a-box>
      <!-- Laptop Screen -->
      <a-box position="0 1.2 -2.1" rotation="20 0 0" width="0.8" height="0.6" depth="0.05" color="#000" class="clickable"
             interactable-task="taskName: Deploy to Server; targetColor: #28B463">
        <a-text value="DEPLOY" align="center" position="0 0 0.03" scale="0.8 0.8 0.8" color="#0F0"></a-text>
      </a-box>

      <!-- Return Button (Hidden by default) -->
      <a-plane id="returnButton" position="-1.5 1.5 -1.5" rotation="0 0 0" width="1.5" height="0.5" color="#4CC3D9" visible="false" return-to-hub>
        <a-text value="Return to Hub" align="center" position="0 0 0.1" color="#FFF"></a-text>
      </a-plane>

      <!-- VR Camera & Cursor Setup -->
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: #0F0; shader: flat">
          </a-entity>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
