<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - Software Simulation</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="script.js"></script>
  </head>
  <body>
    <a-scene scene-greeting="message: Engineering Simulation active. Step 1: Open Terminal to check server logs.">
      
      <!-- HUD -->
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;" position="0 0 -1" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: #0F0; shader: flat"></a-entity>
          <a-text id="scoreDisplay" value="Score: 0" position="-1.5 0.8 -2" color="#0F0" font="mozillavr" scale="0.6 0.6 0.6"></a-text>
          <a-text id="feedbackText" value="Current Objective: Open Terminal" align="center" position="0 0.9 -2" color="#0F0" width="3" font="mozillavr"></a-text>
        </a-camera>
      </a-entity>

      <!-- Office Env -->
      <a-sky color="#1a1a2e"></a-sky> 
      <a-box position="0 0.8 -2" width="4" height="0.1" depth="2" color="#333"></a-box> <!-- Desk -->

      <!-- Laptop Base -->
      <a-box position="0 0.9 -1.8" width="1.2" height="0.05" depth="0.8" color="#555"></a-box>
      
      <!-- Laptop Screen (Main Terminal) -->
      <a-box position="0 1.3 -2.2" rotation="10 0 0" width="1.2" height="0.8" depth="0.05" color="#000"></a-box>

      <!-- TASK 1: Terminal Icon -->
      <a-plane position="-0.4 1.3 -2.15" width="0.2" height="0.2" color="#e67e22" rotation="10 0 0" class="clickable"
             multi-step-task="career: software; stepOrder: 1; taskName: Open Terminal; successMessage: Logs loaded. Error found in Database Config. Next, fix the bug; points: 10">
         <a-text value="1. Term" align="center" position="0 0 0.02" scale="0.6 0.6 0.6" color="#FFF"></a-text>
      </a-plane>

      <!-- TASK 2: Code Bug Fix -->
      <a-plane position="0 1.3 -2.15" width="0.4" height="0.2" color="#e74c3c" rotation="10 0 0" class="clickable"
             multi-step-task="career: software; stepOrder: 2; taskName: Fix Bug; successMessage: Bug fixed! Database connected. Next, deploy to production; points: 15">
         <a-text value="2. Fix DB=Null" align="center" position="0 0 0.02" scale="0.5 0.5 0.5" color="#FFF"></a-text>
      </a-plane>

      <!-- TASK 3: Deploy Button -->
      <a-plane position="0.4 1.3 -2.15" width="0.2" height="0.2" color="#2ecc71" rotation="10 0 0" class="clickable"
             multi-step-task="career: software; stepOrder: 3; taskName: Deploy; successMessage: Code deployed to production. 0 errors detected. Good job!; points: 20">
         <a-text value="3. Deploy" align="center" position="0 0 0.02" scale="0.5 0.5 0.5" color="#FFF"></a-text>
      </a-plane>

      <a-plane id="returnButton" position="0 1.9 -2.2" rotation="0 0 0" width="1.5" height="0.4" color="#3498db" visible="false" return-to-hub>
        <a-text value="Return to Hub" align="center" position="0 0 0.1" color="#FFF"></a-text>
      </a-plane>

    </a-scene>
  </body>
</html>
