<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CareerVerse - Main Hub</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Environment setup -->
      <a-sky color="#ECECEC"></a-sky>
      <!-- Floor -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="10" height="10" color="#7BC8A4"></a-plane>
      
      <!-- Title text -->
      <a-text value="Welcome to CareerVerse!\nSelect a Career" align="center" position="0 2.5 -3" color="#333" width="6"></a-text>

      <!-- Portals / Hub Buttons -->
      
      <!-- Doctor Portal -->
      <a-box id="doctorPortal" position="-2 1 -3" rotation="0 45 0" color="#ef2d5e" class="clickable"
             animation__mouseenter="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; dur: 200"
             animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
             onclick="window.location.href='doctor.html'">
        <a-text value="Doctor" align="center" position="0 0.6 0.51" scale="0.5 0.5 0.5" color="#FFF"></a-text>
      </a-box>

      <!-- Pilot Portal -->
      <a-box id="pilotPortal" position="0 1 -3" color="#4CC3D9" class="clickable"
             animation__mouseenter="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; dur: 200"
             animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
             onclick="window.location.href='pilot.html'">
        <a-text value="Pilot" align="center" position="0 0.6 0.51" scale="0.5 0.5 0.5" color="#FFF"></a-text>
      </a-box>

      <!-- Software Engineer Portal -->
      <a-box id="softwarePortal" position="2 1 -3" rotation="0 -45 0" color="#FFC65D" class="clickable"
             animation__mouseenter="property: scale; to: 1.1 1.1 1.1; startEvents: mouseenter; dur: 200"
             animation__mouseleave="property: scale; to: 1 1 1; startEvents: mouseleave; dur: 200"
             onclick="window.location.href='software.html'">
        <a-text value="Software\nEngineer" align="center" position="0 0.6 0.51" scale="0.5 0.5 0.5" color="#FFF"></a-text>
      </a-box>

      <!-- VR Camera & Cursor Setup -->
      <a-entity position="0 1.6 0">
        <a-camera>
          <a-entity cursor="fuse: false; rayOrigin: mouse;"
                    position="0 0 -1"
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: black; shader: flat"
                    animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"
                    animation__fusing="property: scale; startEvents: fusing; easing: easeInCubic; dur: 1500; from: 1 1 1; to: 0.1 0.1 0.1"
                    animation__mouseleave="property: scale; startEvents: mouseleave; easing: easeInCubic; dur: 500; to: 1 1 1">
          </a-entity>
        </a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
